<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>鞋类图源采集台</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <aside class="panel">
      <h1>鞋类图源采集台</h1>
      <p class="hint">默认快速模式只跑轻量平台。请填写型号、货号或关键词，否则只搜品牌会出现大量无关图片。</p>
      <form id="run-form">
        <label>产品主图 <input name="image" type="file" accept="image/*" required /></label>
        <label>品牌 <input name="brand" placeholder="例如 Nike" /></label>
        <label>型号 <input name="model" placeholder="必填之一：例如 Air Monarch IV" /></label>
        <label>货号 <input name="sku" placeholder="必填之一：例如 415445-102" /></label>
        <label>颜色 <input name="color" placeholder="例如 White Navy" /></label>
        <label>补充关键词 <input name="keywords" placeholder="必填之一：例如 dad shoes, white navy" /></label>
        <section>
          <h2>快速平台</h2>
          <div id="fast-platforms" class="platforms"></div>
        </section>
        <section>
          <h2>深度平台</h2>
          <div id="deep-platforms" class="platforms"></div>
        </section>
        <button id="submit-button" type="submit">开始采集</button>
      </form>
    </aside>
    <section class="workspace">
      <div class="status">
        <strong id="run-title">等待开始</strong>
        <div id="summary" class="summary"></div>
        <pre id="logs"></pre>
      </div>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
