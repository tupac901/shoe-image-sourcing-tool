<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>鞋类以图搜图采集台</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <aside class="panel">
      <h1>鞋类以图搜图采集台</h1>
      <p class="hint">上传一张鞋图，系统只根据图片本身去 Poizon Visual 查找同款，并自动过滤相似款和错款。</p>
      <form id="run-form" class="image-only-form">
        <label class="upload-box">
          <span>产品图片</span>
          <input name="image" type="file" accept="image/*" required />
        </label>
        <fieldset class="platforms">
          <legend>Search platforms</legend>
          <label><input type="checkbox" name="platforms" value="poizon_visual" checked /> Poizon Visual <span>image</span></label>
          <label><input type="checkbox" name="platforms" value="kr_poizon" checked /> KR Poizon <span>search</span></label>
          <label><input type="checkbox" name="platforms" value="wildberries" checked /> WB / Wildberries <span>search</span></label>
          <label><input type="checkbox" name="platforms" value="ozon" checked /> Ozon <span>search</span></label>
        </fieldset>
        <button id="submit-button" type="submit">开始搜图</button>
      </form>
    </aside>
    <section class="workspace">
      <div class="status">
        <strong id="run-title">等待上传图片</strong>
        <div id="summary" class="summary"></div>
        <div id="notice" class="notice" hidden></div>
        <pre id="logs"></pre>
      </div>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
